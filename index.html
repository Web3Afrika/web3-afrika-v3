<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#000000" />
		<meta name="author" content="Web3 Afrika" />

		<link rel="icon" type="image/svg+xml" href="/logo.svg" />
		<link rel="apple-touch-icon" href="/logo192.png" />
		<link rel="manifest" href="/manifest.json" />

		<!--
			Set the theme class on <html> before paint so there is no flash and no
			hydration mismatch. Defaults to dark; honors a saved preference.
		-->
		<script>
			(function () {
				try {
					var t = localStorage.getItem("theme");
					if (t ? t === "dark" : true)
						document.documentElement.classList.add("dark");
					else document.documentElement.classList.remove("dark");
				} catch (e) {
					document.documentElement.classList.add("dark");
				}
			})();
		</script>

		<!--
			Title, description, canonical, Open Graph, Twitter and JSON-LD are
			set per-page at render time via the Seo / JsonLd components
			(vite-react-ssg Head). No static title here to avoid duplicates.
		--></head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
